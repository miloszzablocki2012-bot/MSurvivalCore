messages:
  welcome-main:
    - '&6&l👁 WITAJ NA MSURVIVAL'
    - '&fCześć &e%player%&f! Trafiłeś na serwer survival przygotowany pod długą rozgrywkę.'
    - '&fZnajdziesz tutaj ekonomię, aukcje graczy, sklep serwerowy, klucze, klany, domy, RTP i rozbudowane GUI.'
    - '&fSerwer działa na wersji &e1.21.8&f. Wszystkie najważniejsze systemy są po polsku i mają być proste dla gracza.'
    - '&fNa start użyj kompasu albo wpisz &e/menu&f, żeby otworzyć główne menu serwera.'
  account-info:
    - '&b&l👤 TWOJE KONTO'
    - '&a✔ Konto zostało poprawnie zweryfikowane.'
    - '&a✔ Ranga, prefix i dane gracza zostały wczytane.'
    - '&a✔ Ekwipunek, ekonomia i statystyki zostały zsynchronizowane.'
    - '&a✔ Jeżeli masz konto Premium i konto jest już zabezpieczone hasłem, kolejne wejścia mogą być automatyczne.'
    - '&fJeżeli coś się nie zgadza, zgłoś to administracji zamiast próbować bugować system.'
  player-commands-1:
    - '&e&l📜 KOMENDY DLA GRACZY'
    - '&e/menu &8» &fmenu główne serwera'
    - '&e/pomoc &8» &flista pomocy'
    - '&e/spawn &8» &fteleport na spawn survivalu'
    - '&e/lobby &8» &fpowrót na lobby'
    - '&e/rtp &8» &flosowa bezpieczna teleportacja'
    - '&e/sethome &8» &fustawienie domu'
    - '&e/home &8» &fteleport do domu'
    - '&e/delhome &8» &fusunięcie domu'
    - '&e/home list &8» &flista domów'
  player-commands-2:
    - '&e&l📜 KOMENDY DLA GRACZY'
    - '&e/tpa <gracz> &8» &fprośba o teleport'
    - '&e/tpaccept &8» &fakceptacja teleportu'
    - '&e/tpdeny &8» &fodrzucenie teleportu'
    - '&e/tpacancel &8» &fanulowanie teleportu'
    - '&e/kasa &8» &fstan konta'
    - '&e/bal &8» &fstan konta'
    - '&e/pay <gracz> <kwota> &8» &fprzelew'
    - '&e/bank &8» &fbank gracza'
    - '&e/ah &8» &fsklep graczy'
    - '&e/sellhand <cena> &8» &fwystaw item z ręki'
    - '&e/sklep &8» &fsklep serwera'
    - '&e/keysmenu &8» &fmenu kluczy'
    - '&e/weeklykey &8» &fcotygodniowy klucz'
    - '&e/clan &8» &fsystem klanów'
  rules:
    - '&c&l⚠ REGULAMIN SERWERA'
    - '&f1. Zakaz cheatów, X-Ray, macro, autoclickera i wspomagaczy.'
    - '&f2. Zakaz duplikowania itemów, wykorzystywania bugów i obchodzenia zabezpieczeń.'
    - '&f3. Zakaz podszywania się pod administrację, graczy i twórców.'
    - '&f4. Zakaz celowego lagowania serwera, spamowania i floodowania czatu.'
    - '&f5. Handel rób uczciwie. Oszustwa i próby kradzieży mogą skończyć się karą.'
    - '&f6. Administracja ma prawo cofnąć skutki buga, duplikacji albo nieuczciwej transakcji.'
    - '&eGrając dalej akceptujesz regulamin i zasady fair play.'
  economy:
    - '&a&l💰 EKONOMIA I RYNEK'
    - '&fZarabiasz przez kopanie, farmienie, sprzedaż itemów, handel z graczami i aukcje.'
    - '&fSklep serwera jest pod &e/sklep&f. Sklep graczy jest pod &e/ah&f.'
    - '&fItem z ręki wystawisz komendą &e/sellhand <cena>&f.'
    - '&fPieniądze trzymaj w portfelu albo w banku. Bank może naliczać dzienne odsetki.'
    - '&fNajważniejsze komendy ekonomii: &e/kasa&f, &e/bal&f, &e/pay&f, &e/bank&f, &e/baltop&f.'
  keys:
    - '&d&l🔑 KLUCZE I NAGRODY'
    - '&fDostępne klucze: &aCodzienny&f, &eCotygodniowy&f, &7Klasyczny&f, &fŻelazny&f, &6Złoty&f, &bDiamentowy&f, &aSzmaragdowy&f, &5Epic&f, &6Legendarny&f, &dMityczny&f, &4Boski&f, &cAdministracyjny&f.'
    - '&fKlucz Boski jest bardzo mocny, ale Administracyjny zostaje najwyższym kluczem specjalnym.'
    - '&fKlucze kupisz w rynku, odbierzesz z nagród albo dostaniesz podczas eventów.'
    - '&fMenu kluczy otworzysz przez &e/keysmenu&f.'
  community:
    - '&9&l🌐 SPOŁECZNOŚĆ'
    - '&fIP serwera: &e%ip%'
    - '&fOnline teraz: &a%online%'
    - '&fDiscord: &ediscord.gg/msurvival'
    - '&fYouTube: &e@Milekz'
    - '&fTikTok: &e@Milekz'
    - '&fZgłaszaj błędy administracji. Nie wykorzystuj ich na swoją korzyść.'
  finish:
    - '&6&l👁 START GRY'
    - '&aTo już wszystko, %player%.'
    - '&fMożesz rozpocząć grę. Otwórz &e/menu&f, odbierz nagrody i zacznij survival.'
    - '&fPowodzenia na &6%server%&f!'

