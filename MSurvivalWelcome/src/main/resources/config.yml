settings:
  server-name: 'MSurvival'
  server-ip: 'msurvival.6mc.pl'
  first-join-broadcast: '&6MSurvival &8» &e%player% &fpierwszy raz dołączył na serwer!'
  join-message: '&8[&a+&8] &e%player% &7dołączył na serwer.'
  quit-message: '&8[&c-&8] &e%player% &7opuścił serwer.'

title:
  enabled: true
  title: '&6&lWITAJ NA MSURVIVAL'
  subtitle: '&fNajlepszy Survival Minecraft 1.21.8'
  fade-in: 15
  stay: 60
  fade-out: 20

actionbar:
  login: '&a✔ Konto zostało pomyślnie zalogowane.'

bossbar:
  enabled: true
  title: '&6Miłej gry! Otwórz MENU kompasem znajdującym się w ekwipunku.'
  color: YELLOW
  style: SOLID
  remove-after-ticks: 160

sounds:
  title:
    sound: ENTITY_PLAYER_LEVELUP
    volume: 0.6
    pitch: 1.2

sequence:
  title:
    delay-ticks: 30       # 1.5 sekundy po wejściu
  actionbar:
    delay-ticks: 80       # 4 sekundy
  bossbar:
    delay-ticks: 140      # 7 sekund
  chat:
    start-delay-ticks: 200 # 10 sekund
    section-gap-ticks: 120 # co 6 sekund
    sections:
      - welcome-main
      - account-info
      - commands
      - economy
      - keys
      - community
      - finish

skip:
  actionbar: '&aPominięto wiadomości powitalne.'
  chat: '&6MSurvival &8» &aPominięto intro powitalne. Miłej gry!'

