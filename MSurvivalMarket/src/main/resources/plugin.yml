name: MSurvivalMarket
version: 7.0
main: pl.msurvival.market.MSurvivalMarket
api-version: '1.21'
author: Milekz
commands:
  rynek:
    usage: /rynek
    aliases: [market]
  sklep:
    usage: /sklep
  kasa:
    usage: /kasa
    aliases: [money, balance, bal]
  baltop:
    usage: /baltop
  sell:
    usage: /sell
  sellall:
    usage: /sellall
  kosz:
    usage: /kosz
  pay:
    usage: /pay <gracz> <kwota>
  ah:
    usage: /ah
    aliases: [aukcje, playershop, sklepgraczy]
  sellhand:
    usage: /sellhand <cena>
  buyoffer:
    usage: /buyoffer <id>
  canceloffer:
    usage: /canceloffer <id>
  mojeoferty:
    usage: /mojeoferty
  moneyadmin:
    usage: /moneyadmin <give|take|set> <gracz> <kwota>
    aliases: [kasaadmin, adminmoney, eco]
  rynekadmin:
    usage: /rynekadmin <reload|clearoffers>
permissions:
  msurvival.market.admin:
    default: op
