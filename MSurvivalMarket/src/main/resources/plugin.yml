name: MSurvivalMarket
version: 4.6
main: pl.msurvival.market.MSurvivalMarket
api-version: '1.21'
commands:
  rynek: {usage: /rynek, aliases: [sklep, market]}
  kasa: {usage: /kasa, aliases: [money, balance]}
  sell: {usage: /sell}
  sellall: {usage: /sellall}
  kosz: {usage: /kosz}
  pay: {usage: /pay <gracz> <kwota>}
  rynekadmin: {usage: /rynekadmin give <gracz> <kwota>}
permissions:
  msurvival.market.admin: {default: op}
