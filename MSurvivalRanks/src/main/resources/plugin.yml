name: MSurvivalRanks
version: 5.8
main: pl.msurvival.ranks.MSurvivalRanks
api-version: 5.8
author: Milekz
commands:
  rank:
    usage: /rank [gracz]
  ranga:
    usage: /ranga [gracz]
  setrank:
    usage: /setrank <gracz> <ranga>
  setranktemp:
    usage: /setranktemp <gracz> <ranga> <czas>
    aliases: [temprank]
  delrank:
    usage: /delrank <gracz>
  ranksreload:
    usage: /ranksreload
permissions:
  msurvival.ranks.admin:
    default: op
