name: MSurvivalCompass
version: 6.4
main: pl.msurvival.compass.MSurvivalCompass
api-version: '1.21'
author: Milekz
softdepend: [Multiverse-Core, Multiverse-Inventories]
commands:
  lobby:
    usage: /lobby
    aliases: [hub]
  survival:
    usage: /survival
  menu:
    usage: /menu
  setmsspawn:
    usage: /setmsspawn <lobby|survival>
  msspawns:
    usage: /msspawns
  compassreload:
    usage: /compassreload
  compassbypass:
    usage: /compassbypass <on|off>
permissions:
  msurvival.compass.admin:
    default: op
  msurvival.compass.bypass:
    default: op
