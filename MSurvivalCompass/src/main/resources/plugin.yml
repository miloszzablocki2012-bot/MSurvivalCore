name: MSurvivalCompass
version: 5.2
main: pl.msurvival.compass.MSurvivalCompass
api-version: '1.21'
author: Milekz
commands:
  lobby:
    usage: /lobby
    aliases: [hub]
  survival:
    usage: /survival
  menu:
    usage: /menu
  compassreload:
    usage: /compassreload
  compassbypass:
